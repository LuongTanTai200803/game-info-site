backend:
  name: git-gateway
  branch: main

media_library:
  name: cloudinary
  config:
    cloud_name: "cjd5et2o"
    api_key: "883771568633784"
    folder: "game-info-site/posts"

collections:
  - name: "posts"
    label: "Bài viết"
    folder: "content/posts"
    create: true
    extension: "mdx"
    format: "frontmatter"
    slug: "{{slug}}"

    fields:
      - label: "Tiêu đề"
        name: "title"
        widget: "string"

      - label: "Ngày đăng"
        name: "date"
        widget: "datetime"

      - label: "Danh mục"
        name: "category"
        widget: "string"

      - label: "Ảnh bìa"
        name: "image"
        widget: "supabase-image"
        required: false

      - label: "Nội dung"
        name: "body"
        widget: "markdown"