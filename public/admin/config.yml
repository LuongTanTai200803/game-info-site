backend:
  name: git-gateway
  branch: main

media_folder: "public/uploads"
public_folder: "/uploads"

collections:
  - name: "posts"
    label: "Bài viết"
    folder: "content/posts"
    create: true
    extension: "mdx"
    format: "frontmatter"
    slug: "{{slug}}"

    fields:
      - label: "Tiêu đề"
        name: "title"
        widget: "string"

      - label: "Ngày đăng"
        name: "date"
        widget: "datetime"

      - label: "Danh mục"
        name: "category"
        widget: "string"

      - label: "Ảnh bìa"
        name: "image"
        widget: "image"

      - label: "Nội dung"
        name: "body"
        widget: "markdown"